services:
  server1:
    container_name: server1
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - DB_HOST=${DB_HOST:-pg}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-studs}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - SERVER_PORT=45205
    networks:
      - proxy_net

  server2:
    container_name: server2
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - DB_HOST=${DB_HOST:-pg}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-studs}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - SERVER_PORT=45205
    networks:
      - proxy_net

  server3:
    container_name: server3
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - DB_HOST=${DB_HOST:-pg}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-studs}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - SERVER_PORT=45205
    networks:
      - proxy_net

  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "45205:45205"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - proxy_net
    depends_on:
      - server1
      - server2
      - server3

  client:
    container_name: client
    build:
      context: ./client
      dockerfile: Dockerfile
    environment:
      - SERVER_HOST=nginx
      - SERVER_PORT=45205
    networks:
      - proxy_net
    depends_on:
      - nginx
    stdin_open: true

networks:
  proxy_net:
    ipam:
      config:
        - subnet: 192.168.1.0/24
