services:
  server1:
    container_name: server1
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "9090"
    environment:
      - COLLECTION_FILE=/data/collection.json
    volumes:
      - collection_data:/data
    networks:
      - proxy_net

  server2:
    container_name: server2
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "9090"
    environment:
      - COLLECTION_FILE=/data/collection.json
    volumes:
      - collection_data:/data
    networks:
      - proxy_net

  server3:
    container_name: server3
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "9090"
    environment:
      - COLLECTION_FILE=/data/collection.json
    volumes:
      - collection_data:/data
    networks:
      - proxy_net

  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "9090:9090"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - proxy_net
    depends_on:
      - server1
      - server2
      - server3

  client:
    container_name: client
    build:
      context: ./client
      dockerfile: Dockerfile
    environment:
      - SERVER_HOST=nginx
      - SERVER_PORT=9090
    networks:
      - proxy_net
    depends_on:
      - nginx
    stdin_open: true

volumes:
  collection_data:

networks:
  proxy_net:
    ipam:
      config:
        - subnet: 192.168.1.0/24
